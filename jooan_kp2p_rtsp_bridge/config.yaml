name: "Jooan kp2p RTSP Bridge"
version: "0.4.1"
slug: "jooan_kp2p_rtsp_bridge"
description: "Restream Jooan/Juanvision kp2p cameras as standard RTSP streams"
init: false
startup: services
boot: auto
host_network: true
arch:
  - aarch64
  - amd64
  - armv7
url: "https://github.com/TomasReiff/jooan-kp2p-rtsp-bridge"
options:
  use_uid: false
  host: "192.168.1.10"
  port: 10000
  uid: ""
  username: "admin"
  password: ""
  reconnect_delay: 3
  ffmpeg_loglevel: "warning"
  cameras:
    - channel: 0
      enabled: true
      stream_id: 0
      rtsp_port: 8551
      rtsp_path: "cam1"
    - channel: 1
      enabled: true
      stream_id: 0
      rtsp_port: 8552
      rtsp_path: "cam2"
    - channel: 2
      enabled: true
      stream_id: 0
      rtsp_port: 8553
      rtsp_path: "cam3"
    - channel: 3
      enabled: true
      stream_id: 0
      rtsp_port: 8554
      rtsp_path: "cam4"
    - channel: 4
      enabled: true
      stream_id: 0
      rtsp_port: 8555
      rtsp_path: "cam5"
    - channel: 5
      enabled: true
      stream_id: 0
      rtsp_port: 8556
      rtsp_path: "cam6"
    - channel: 6
      enabled: true
      stream_id: 0
      rtsp_port: 8557
      rtsp_path: "cam7"
    - channel: 7
      enabled: true
      stream_id: 0
      rtsp_port: 8558
      rtsp_path: "cam8"
schema:
  use_uid: "bool?"
  host: "str?"
  port: "port?"
  uid: "str?"
  username: "str?"
  password: "password?"
  reconnect_delay: "int(1,)?"
  ffmpeg_loglevel: "list(quiet|panic|fatal|error|warning|info|verbose|debug|trace)?"
  cameras:
    - channel: "int(0,63)"
      enabled: "bool?"
      stream_id: "int(0,1)?"
      rtsp_port: "port?"
      rtsp_path: "str?"
