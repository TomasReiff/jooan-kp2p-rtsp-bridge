name: "Jooan kp2p RTSP Bridge"
version: "0.3.0"
slug: "jooan_kp2p_rtsp_bridge"
description: "Restream Jooan/Juanvision kp2p cameras as standard RTSP streams"
startup: services
boot: auto
host_network: true
arch:
  - aarch64
  - amd64
  - armv7
url: "https://github.com/TomasReiff/jooan-kp2p-rtsp-bridge"
options:
  use_uid: false
  host: "192.168.1.10"
  port: 10000
  uid: ""
  username: "admin"
  password: ""
  reconnect_delay: 3
  ffmpeg_loglevel: "warning"
  cameras:
    - channel: 0
      enabled: true
      stream_id: 0
      rtsp_port: 8554
      rtsp_path: "cam1"
    - channel: 1
      enabled: true
      stream_id: 0
      rtsp_port: 8555
      rtsp_path: "cam2"
    - channel: 2
      enabled: true
      stream_id: 0
      rtsp_port: 8556
      rtsp_path: "cam3"
schema: false
